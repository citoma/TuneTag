<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0058bc',
            'primary-container': '#0070eb',
            background: '#f9f9fb',
            surface: '#f9f9fb',
            'surface-container-low': '#f3f3f5',
            'surface-container-lowest': '#ffffff',
            'on-surface': '#1a1c1d',
            'on-surface-variant': '#414755',
            outline: '#717786',
            'outline-variant': '#c1c6d7'
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .mac-scrollbar::-webkit-scrollbar { width: 8px; }
    .mac-scrollbar::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
  </style>
</head>
<body class="bg-background text-on-surface h-screen flex flex-col overflow-hidden">
  <header class="w-full h-12 flex items-center justify-between px-6 bg-slate-50/70 backdrop-blur-3xl shadow-sm">
    <div class="text-lg font-semibold text-slate-900">TuneTag</div>
    <button class="px-5 py-1.5 rounded-lg bg-gradient-to-br from-primary to-primary-container text-white text-sm font-medium shadow-sm">保存</button>
  </header>

  <main class="flex-1 flex overflow-hidden">
    <section class="w-[70%] flex flex-col bg-surface overflow-hidden">
      <div class="grid grid-cols-[2fr_1.2fr_1.5fr_0.8fr_1fr] px-6 py-2.5 bg-surface-container-low text-[11px] font-semibold text-on-surface-variant uppercase tracking-wider">
        <div>文件名</div><div>歌手</div><div>专辑</div><div>年份</div><div>状态</div>
      </div>
      <div class="flex-1 overflow-y-auto mac-scrollbar">
        <div class="grid grid-cols-[2fr_1.2fr_1.5fr_0.8fr_1fr] px-6 py-3 items-center text-sm bg-primary text-white font-medium">
          <div class="truncate pr-4">01. Midnight City.flac</div><div class="truncate pr-4 opacity-90">M83</div><div class="truncate pr-4 opacity-90">Hurry Up, We're Dreaming</div><div class="opacity-90">2011</div><div class="text-xs opacity-80">已修改</div>
        </div>
        <div class="grid grid-cols-[2fr_1.2fr_1.5fr_0.8fr_1fr] px-6 py-3 items-center text-sm hover:bg-surface-container-low"><div class="truncate pr-4 font-medium">02. Reunion.flac</div><div class="truncate pr-4 text-on-surface-variant">M83</div><div class="truncate pr-4 text-on-surface-variant">Hurry Up, We're Dreaming</div><div class="text-on-surface-variant">2011</div><div class="text-xs text-outline italic">原始</div></div>
        <div class="grid grid-cols-[2fr_1.2fr_1.5fr_0.8fr_1fr] px-6 py-3 items-center text-sm hover:bg-surface-container-low"><div class="truncate pr-4 font-medium">Stay.mp3</div><div class="truncate pr-4 text-on-surface-variant">Hans Zimmer</div><div class="truncate pr-4 text-on-surface-variant">Interstellar OST</div><div class="text-on-surface-variant">2014</div><div class="text-xs text-outline italic">原始</div></div>
      </div>
    </section>

    <aside class="w-[30%] bg-surface-container-low border-l border-outline-variant/30 flex flex-col">
      <div class="p-6 overflow-y-auto space-y-4">
        <h2 class="text-sm font-bold">基础信息</h2>
        <label class="text-xs text-on-surface-variant">标题</label>
        <input class="w-full px-3 py-2 bg-surface-container-lowest rounded-lg text-sm" value="Midnight City" />
        <label class="text-xs text-on-surface-variant">艺术家</label>
        <input class="w-full px-3 py-2 bg-surface-container-lowest rounded-lg text-sm" value="M83" />
        <label class="text-xs text-on-surface-variant">专辑</label>
        <input class="w-full px-3 py-2 bg-surface-container-lowest rounded-lg text-sm" value="Hurry Up, We're Dreaming" />
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-on-surface-variant">年份</label>
            <input class="w-full px-3 py-2 bg-surface-container-lowest rounded-lg text-sm" value="2011" />
          </div>
          <div>
            <label class="text-xs text-on-surface-variant">曲目号</label>
            <input class="w-full px-3 py-2 bg-surface-container-lowest rounded-lg text-sm" value="1/22" />
          </div>
        </div>
      </div>
      <div class="mt-auto p-4 border-t border-outline-variant/20 text-xs text-outline">
        已选中 1 个文件
      </div>
    </aside>
  </main>
</body>
</html>
